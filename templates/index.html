<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBot UI - Phase 2</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <aside id="sidebar">
        <h3>Чаты (Сессии)</h3>
        <div class="chat-list">
            <p>Новый чат</p>
            <p>Прошлый чат #1</p>
        </div>
    </aside>

    <main id="chat-container">
        <div id="messages-history">
        </div>

        <form id="input-area">
            <input type="text" id="user-input" placeholder="Введите сообщение..." autocomplete="off">
            <button type="submit" id="send-btn">Отправить</button>
        </form>
    </main>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
